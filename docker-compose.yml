version: '3.8'

services:

  php:
    build: .
    container_name: laravel-app
    restart: always

    volumes:
      - ./:/var/www/html/docker-laravel

    ports:
      - "8005:80"

    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: docker_laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: "12345678"

    ports:
      - "8006:3306"

    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    restart: always

    ports:
      - "8007:80"

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1   # 👈 IMPORTANT

    depends_on:
      - db

volumes:
  db_data: