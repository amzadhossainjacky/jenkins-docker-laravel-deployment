version: '3.8'

services:

  php:
    build: .
    container_name: laravel-app
    restart: always

    volumes:
      - ./:/var/www/html/docker-laravel

    ports:
      - "8001:80"

    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: docker_laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: "12345678"

    ports:
      - "8002:3306"

    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    restart: always

    ports:
      - "8003:80"

    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root

    depends_on:
      - db

volumes:
  db_data: