version: '3.8'

services:

  php:
    build: .
    container_name: laravel-app
    restart: always

    ports:
      - "9000:9000"

    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx

    restart: always

    ports:
      - "8001:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

  db:
    image: mysql:5.7
    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: docker_laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: "12345678"

    ports:
      - "8002:3306"

    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    restart: always

    ports:
      - "8003:80"

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1

    depends_on:
      - db

volumes:
  db_data: